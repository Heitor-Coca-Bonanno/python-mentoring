<!DOCTYPE html>
<!--
This is the local course portal. You can open it directly, or serve it:
  python3 -m http.server 8000
  then open http://localhost:8000/portal/
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Mentoring — Course Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<style>
/* Copied from root course.html (portal UI) */
:root {
  --bg: #0c0e12;
  --bg2: #12151c;
  --bg3: #1a1f2b;
  --bg4: #222736;
  --border: #2a303f;
  --border2: #353d52;
  --text: #e8eaf0;
  --text2: #9ba3ba;
  --text3: #5f6880;
  --amber: #f59e0b;
  --amber2: #fbbf24;
  --amber-dim: #f59e0b22;
  --amber-bg: #f59e0b14;
  --green: #34d399;
  --green-dim: #34d39922;
  --red: #f87171;
  --red-dim: #f8717122;
  --blue: #60a5fa;
  --blue-dim: #60a5fa18;
  --purple: #a78bfa;
  --radius: 8px;
  --radius2: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.header-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--amber);
  letter-spacing: -0.5px;
}
.header-logo span { color: var(--text2); font-weight: 400; }
.header-badge {
  font-size: 11px;
  font-family: 'Fira Code', monospace;
  background: var(--amber-dim);
  color: var(--amber2);
  border: 1px solid var(--amber);
  padding: 2px 8px;
  border-radius: 100px;
  letter-spacing: 0.5px;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.arc-tag {
  font-size: 11px;
  font-family: 'Fira Code', monospace;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid;
}
.arc-tag.a1 { background: #60a5fa14; color: #93c5fd; border-color: #60a5fa44; }
.arc-tag.a2 { background: #34d39914; color: #6ee7b7; border-color: #34d39944; }
.arc-tag.a3 { background: #a78bfa14; color: #c4b5fd; border-color: #a78bfa44; }
.layout { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 8px;
}
.sidebar-section {
  font-size: 10px;
  font-family: 'Fira Code', monospace;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 8px 12px 4px;
  margin-top: 8px;
}
.session-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: var(--radius);
  text-align: left;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.session-btn:hover { background: var(--bg3); }
.session-btn.active { background: var(--amber-bg); }
.session-num {
  font-family: 'Fira Code', monospace;
  font-size: 11px;
  color: var(--text3);
  width: 20px;
  flex-shrink: 0;
}
.session-btn.active .session-num { color: var(--amber); }
.session-info { flex: 1; min-width: 0; }
.session-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-btn.active .session-title { color: var(--amber2); }
.session-tag {
  font-size: 10px;
  color: var(--text3);
  font-family: 'Fira Code', monospace;
  margin-top: 1px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); }
.session-btn.active .dot { background: var(--amber); }
.main { flex: 1; overflow-y: auto; padding: 28px 36px; background: var(--bg); }
.session-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 18px; }
.session-number-big {
  font-family: 'Syne', sans-serif;
  font-size: 56px;
  font-weight: 800;
  color: var(--border2);
  line-height: 1;
  letter-spacing: -3px;
}
.session-meta { flex: 1; }
.session-arc {
  font-size: 11px;
  font-family: 'Fira Code', monospace;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.session-name {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.session-desc { margin-top: 8px; color: var(--text2); font-size: 14px; line-height: 1.6; max-width: 720px; }
.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-family: 'Fira Code', monospace;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin: 18px 0 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.links {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px 16px;
}
.links a {
  color: var(--amber2);
  text-decoration: none;
  font-family: 'Fira Code', monospace;
  font-size: 12px;
}
.links a:hover { text-decoration: underline; }
.links-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.playground { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden; }
.playground-header { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); }
.playground-title { font-size: 12px; font-family: 'Fira Code', monospace; color: var(--text3); flex: 1; }
.run-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 14px; background: var(--amber); color: #000;
  border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer;
}
.clear-btn { padding: 5px 10px; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; }
.code-textarea {
  width: 100%;
  min-height: 220px;
  background: var(--bg);
  color: #c9d1d9;
  border: none;
  outline: none;
  font-family: 'Fira Code', monospace;
  font-size: 13.5px;
  line-height: 1.7;
  padding: 16px 20px;
  resize: vertical;
  tab-size: 4;
}
.playground-output { border-top: 1px solid var(--border); background: var(--bg); }
.output-label { padding: 6px 16px; font-size: 10px; font-family: 'Fira Code', monospace; color: var(--text3); letter-spacing: 1px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.output-text { padding: 12px 20px; font-family: 'Fira Code', monospace; font-size: 13px; color: var(--green); line-height: 1.7; min-height: 60px; white-space: pre-wrap; }
.output-text.error { color: var(--red); }
.output-text.empty { color: var(--text3); font-style: italic; }
.py-status {
  position: fixed;
  bottom: 16px;
  right: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px;
  font-size: 11px;
  font-family: 'Fira Code', monospace;
  color: var(--text3);
  z-index: 100;
}
.py-status.ready { color: var(--green); border-color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🐍 py<span>mentor</span></div>
  <div class="header-badge">10 sessions · 20 hours</div>
  <div class="header-right">
    <div class="arc-tag a1">Arc 1 · Think</div>
    <div class="arc-tag a2">Arc 2 · Build</div>
    <div class="arc-tag a3">Arc 3 · Ship</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<div class="py-status" id="pyStatus">⏳ loading python…</div>

<script>
const SESSIONS = [
  { num: 1, title: "How Computers Think", arc: "Arc 1 — Think Like a Computer", arcClass: "a1",
    tags: ["algorithms","pseudocode","logic"],
    desc: "Before writing a single line of Python, learn how to describe precise steps and test your logic like a computer would.",
    folder: "../day-01-how-computers-think/",
    code: `scores = [72, 85, 91, 68, 77, 95, 83]\nbest = scores[0]\nfor score in scores:\n    if score > best:\n        best = score\nprint(\"Highest score:\", best)` },
  { num: 2, title: "Your First Python", arc: "Arc 1 — Think Like a Computer", arcClass: "a1",
    tags: ["variables","types","input()"],
    desc: "Write real Python: variables, data types, and printing/asking the user for information.",
    folder: "../day-02-first-python/",
    code: `name = input(\"Name: \")\nage = int(input(\"Age: \"))\nprint(f\"Hi {name}, next year you'll be {age+1}!\")` },
  { num: 3, title: "Decisions & Loops", arc: "Arc 1 — Think Like a Computer", arcClass: "a1",
    tags: ["if/else","while","for"],
    desc: "Make programs choose paths and repeat actions: the foundation of almost every game/app.",
    folder: "../day-03-decisions-and-loops/",
    code: `import random\nsecret = random.randint(1,10)\nwhile True:\n    g = int(input(\"Guess 1-10: \"))\n    if g == secret:\n        print(\"Correct!\")\n        break\n    print(\"Try again\")` },
  { num: 4, title: "Functions", arc: "Arc 2 — Build With Code", arcClass: "a2",
    tags: ["def","return","DRY"],
    desc: "Organize code into reusable building blocks. Learn the difference between printing and returning.",
    folder: "../day-04-functions/",
    code: `def c_to_f(c):\n    return (c * 9/5) + 32\nprint(c_to_f(25))` },
];

let currentSession = 0;
let skulptReady = false;

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const arcs = [
    { label: 'Arc 1 · Think', range: [0,2] },
    { label: 'Arc 2 · Build', range: [3,3] },
  ];
  let html = '';
  arcs.forEach(arc => {
    html += `<div class="sidebar-section">${arc.label}</div>`;
    for (let i = arc.range[0]; i <= arc.range[1]; i++) {
      const s = SESSIONS[i];
      const active = i === currentSession ? 'active' : '';
      html += `
        <button class="session-btn ${active}" onclick="selectSession(${i})">
          <span class="session-num">${String(s.num).padStart(2,'0')}</span>
          <span class="session-info">
            <div class="session-title">${s.title}</div>
            <div class="session-tag">${s.tags[0]} · ${s.tags[1] || ''}</div>
          </span>
          <span class="dot"></span>
        </button>`;
    }
  });
  sidebar.innerHTML = html;
}

function renderMain() {
  const s = SESSIONS[currentSession];
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="session-header">
      <div class="session-number-big">${String(s.num).padStart(2,'0')}</div>
      <div class="session-meta">
        <div class="session-arc">${s.arc}</div>
        <div class="session-name">${s.title}</div>
        <div class="session-desc">${s.desc}</div>
      </div>
    </div>

    <div class="section-label">Session Materials (repo links)</div>
    <div class="links">
      <div class="links-grid">
        <div><a href="${s.folder}README.md" target="_blank">Open session README.md</a></div>
        <div><a href="${s.folder}exercises/" target="_blank">Open exercises folder</a></div>
        <div><a href="${s.folder}solutions/" target="_blank">Open solutions folder</a></div>
        <div><a href="../README.md" target="_blank">Open course README.md</a></div>
      </div>
      <div style="margin-top:10px;color:var(--text3);font-size:12px;line-height:1.5">
        Tip: if these links don’t open correctly from <code>file://</code>, run <code>python3 -m http.server</code> and open the portal via <code>http://localhost</code>.
      </div>
    </div>

    <div class="section-label">Code Playground (runs in browser)</div>
    <div class="playground">
      <div class="playground-header">
        <div class="playground-title">session_${String(s.num).padStart(2,'0')}_example.py</div>
        <button class="clear-btn" onclick="clearCode()">clear</button>
        <button class="run-btn" id="runBtn" onclick="runCode()">Run Python</button>
      </div>
      <div class="playground-editor">
        <textarea class="code-textarea" id="codeArea" spellcheck="false">${s.code}</textarea>
      </div>
      <div class="playground-output">
        <div class="output-label">OUTPUT</div>
        <div class="output-text empty" id="outputArea">Click "Run Python" to execute the code above…</div>
      </div>
    </div>
  `;
  setupCodeArea();
}

function setupCodeArea() {
  const ta = document.getElementById('codeArea');
  if (!ta) return;
  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 4;
    }
  });
}

function selectSession(idx) {
  currentSession = idx;
  renderSidebar();
  renderMain();
  document.getElementById('main').scrollTo(0, 0);
}

function clearCode() {
  document.getElementById('codeArea').value = '';
  const out = document.getElementById('outputArea');
  out.textContent = 'Editor cleared. Write some Python!';
  out.className = 'output-text empty';
}

function runCode() {
  const code = document.getElementById('codeArea').value;
  const out = document.getElementById('outputArea');
  const btn = document.getElementById('runBtn');

  if (!skulptReady) {
    out.textContent = '⏳ Python engine still loading, please wait a moment…';
    out.className = 'output-text empty';
    return;
  }

  btn.textContent = 'Running…';
  btn.disabled = true;
  out.textContent = '';
  out.className = 'output-text';

  let outputBuffer = '';
  function outfn(text) {
    outputBuffer += text;
    out.textContent = outputBuffer;
    out.className = 'output-text';
  }

  function builtinRead(x) {
    if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
      throw "File not found: '" + x + "'";
    return Sk.builtinFiles["files"][x];
  }

  Sk.configure({
    output: outfn,
    read: builtinRead,
    inputfun: function(prompt) {
      return new Promise(resolve => {
        const val = window.prompt(prompt || '') || '';
        resolve(val);
      });
    },
    inputfunTakesPrompt: true
  });

  const myPromise = Sk.misceval.asyncToPromise(() =>
    Sk.importMainWithBody("<stdin>", false, code, true)
  );

  myPromise.then(() => {
    if (!outputBuffer) {
      out.textContent = '(no output — did you forget print()?)';
      out.className = 'output-text empty';
    }
    btn.textContent = 'Run Python';
    btn.disabled = false;
  }).catch(err => {
    let msg = err.toString();
    if (err.args) {
      try { msg = err.args.v[0].v; } catch(e) {}
    }
    out.textContent = '❌ ' + msg;
    out.className = 'output-text error';
    btn.textContent = 'Run Python';
    btn.disabled = false;
  });
}

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar();
  renderMain();

  setTimeout(() => {
    if (typeof Sk !== 'undefined') {
      skulptReady = true;
      const status = document.getElementById('pyStatus');
      status.textContent = '✓ python ready';
      status.classList.add('ready');
      setTimeout(() => { status.style.opacity = '0'; status.style.transition = 'opacity 1s'; }, 2000);
    }
  }, 800);
});
</script>
</body>
</html>
